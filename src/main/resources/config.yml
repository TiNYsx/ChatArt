# ChatArt Configuration

# Render mode for player heads:
#   braille (default) — configurable dimensions using solid blocks
#   mini              — single row (ignores head-height)
#   full              — raw 8×8 blocks (ignores head-width / head-height)
render-mode: braille

# Output dimensions of the rendered head (characters wide × text rows tall).
head-width: 20
head-height: 8

# Hover over player names in chat to preview their head.
hover-head: true

# Print the rendered head above every chat message.
show-head-in-chat: false

# How long to cache downloaded skins before re-fetching (minutes).
skin-cache-minutes: 60

# ── Custom Emoji ──────────────────────────────────────────────────────────
# Place PNG/JPG images in plugins/ChatArt/images/ and use :name: in chat.
# The file name (without extension) becomes the emoji name.

# Width (in characters) of inline emoji shown in chat.
emoji-width: 8

# Dimensions for /chatart preview output.
emoji-preview-width: 20
emoji-preview-height: 10
