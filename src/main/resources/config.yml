# ChatArt Configuration

# How player heads are rendered in chat.
#
#   braille (default) — 4 rows × 8 chars
#     Face scaled 2× to 16×16, then Braille characters applied.
#     Each char covers 1 face column × 2 face rows.
#     Good quality, compact. Recommended.
#
#   mini   — 1 row × 8 chars
#     Face squished to 16×4, then Braille applied.
#     Braille dots encode the column's vertical luminance structure.
#     One chat line — minimal but shows correct colour palette.
#
#   full   — 8 rows × 8 chars
#     One █ per pixel, maximum fidelity, most vertical space.
render-mode: braille

# Hover over player names in chat to preview their head.
hover-head: true

# Print the rendered head above every chat message.
# With render-mode braille this adds 4 lines per message.
show-head-in-chat: false

# How long to cache downloaded skins before re-fetching (minutes).
skin-cache-minutes: 60
