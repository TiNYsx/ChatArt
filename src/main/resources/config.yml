# ChatArt Configuration

# Render mode:
#   braille (default) — Braille characters with hex colours, like Pictogram
#   mini              — same but forced to 1 row (ignores head-height)
#   full              — raw 8×8 using █ blocks (ignores head-width / head-height)
render-mode: braille

# Output dimensions of the rendered head (Braille characters wide × text rows tall).
# Wider  = more horizontal detail.
# Taller = more vertical detail.
# Each Braille character covers a 2×4 pixel cell of the scaled face image.
#
# Examples:
#   20 × 8  — detailed, good for /head command (default)
#   20 × 4  — compact
#   30 × 8  — very wide, Pictogram-like
#   10 × 4  — small emoji-like
head-width: 20
head-height: 8

# Hover over player names in chat to preview their head.
hover-head: true

# Print the rendered head above every chat message.
show-head-in-chat: false

# How long to cache downloaded skins before re-fetching (minutes).
skin-cache-minutes: 60
