# ChatArt Configuration

# How player heads are rendered in chat.
#
#   mini    — 1 row × 8 chars (default, emoji-like)
#             Each block = average color of one vertical column.
#
#   braille — 2 rows × 4 chars, like Pictogram's MOTD rendering.
#             Uses Braille dot patterns for fine luminance detail.
#
#   full    — 8 rows × 8 chars, one pixel per character (large).
render-mode: mini

# Hover over player names in chat to preview their head.
hover-head: true

# Print the rendered head above every chat message.
# Works best with render-mode: mini (adds only 1 line per message).
show-head-in-chat: false

# How long to cache downloaded skins before re-fetching (minutes).
skin-cache-minutes: 60
